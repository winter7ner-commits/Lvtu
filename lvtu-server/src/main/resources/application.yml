server:
  port: 8080

spring:
  application:
    name: lvtu
  datasource:
    url: jdbc:h2:mem:lvtu_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

logging:
  level:
    com.bitzh.lvtu: DEBUG
    org.hibernate.SQL: DEBUG
